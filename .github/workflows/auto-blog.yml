name: Auto Blog Post

on:
  # Every Monday at 10 AM Central Time (16:00 UTC)
  schedule:
    - cron: '0 16 * * 1'

  # Manual trigger — optionally provide a custom topic
  workflow_dispatch:
    inputs:
      topic:
        description: 'Blog topic (leave blank for a random topic from the bank)'
        required: false
        default: ''

jobs:
  generate:
    name: Generate blog draft
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: site/package-lock.json

      - name: Install dependencies
        working-directory: site
        run: npm install

      - name: Generate and publish blog draft
        working-directory: site
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          SANITY_PROJECT_ID: ${{ secrets.SANITY_PROJECT_ID }}
          SANITY_DATASET: ${{ secrets.SANITY_DATASET || 'production' }}
          SANITY_WRITE_TOKEN: ${{ secrets.SANITY_WRITE_TOKEN }}
        run: node scripts/generate-blog-post.mjs "${{ github.event.inputs.topic }}"
